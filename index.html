<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daily Care Report</title>

<style>

body{
font-family:Arial;
background:#0f1a20;
color:white;
padding:15px;
max-width:500px;
margin:auto;
}

h2{
text-align:center;
}

input,select,textarea{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:none;
}

.task{
background:#1c2a33;
padding:10px;
margin-top:10px;
border-radius:8px;
}

.options{
display:flex;
gap:20px;
margin-top:5px;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:12px;
width:100%;
margin-top:15px;
border-radius:8px;
font-size:16px;
}

.section{
display:none;
}

</style>


<script>

function showSection(){

let section=document.getElementById("time").value

document.getElementById("morning").style.display="none"
document.getElementById("afternoon").style.display="none"
document.getElementById("evening").style.display="none"

if(section=="morning"){
document.getElementById("morning").style.display="block"
}

if(section=="afternoon"){
document.getElementById("afternoon").style.display="block"
}

if(section=="evening"){
document.getElementById("evening").style.display="block"
}

}


function shareWhatsApp(){

let client=document.getElementById("client").value
let carer=document.getElementById("carer").value
let date=document.getElementById("date").value
let time=document.getElementById("time").value
let notes=document.getElementById("notes").value

let text="Daily Care Report%0A"
text+="Client: "+client+"%0A"
text+="Carer: "+carer+"%0A"
text+="Date: "+date+"%0A"
text+="Shift: "+time+"%0A%0A"
text+="Notes: "+notes

let url="https://wa.me/?text="+text

window.open(url)

}

</script>

</head>


<body>

<h2>Daily Care Report</h2>

<label>Client Name</label>
<input id="client">

<label>Carer Name</label>
<input id="carer">

<label>Date</label>
<input type="date" id="date">

<label>Select Shift</label>

<select id="time" onchange="showSection()">

<option value="">Choose</option>
<option value="morning">Morning</option>
<option value="afternoon">Afternoon</option>
<option value="evening">Evening</option>

</select>


<!-- MORNING -->

<div id="morning" class="section">

<div class="task">
Assist with washing / bathing
<div class="options">
<label><input type="radio" name="bath"> Yes</label>
<label><input type="radio" name="bath"> No</label>
</div>
</div>

<div class="task">
Oral hygiene
<div class="options">
<label><input type="radio" name="oral"> Yes</label>
<label><input type="radio" name="oral"> No</label>
</div>
</div>

<div class="task">
Breakfast & hydration
<div class="options">
<label><input type="radio" name="breakfast"> Yes</label>
<label><input type="radio" name="breakfast"> No</label>
</div>
</div>

<div class="task">
Medication given
<div class="options">
<label><input type="radio" name="med1"> Yes</label>
<label><input type="radio" name="med1"> No</label>
</div>
</div>

</div>



<!-- AFTERNOON -->

<div id="afternoon" class="section">

<div class="task">
Lunch & hydration
<div class="options">
<label><input type="radio" name="lunch"> Yes</label>
<label><input type="radio" name="lunch"> No</label>
</div>
</div>

<div class="task">
Mobility assistance
<div class="options">
<label><input type="radio" name="mobility"> Yes</label>
<label><input type="radio" name="mobility"> No</label>
</div>
</div>

<div class="task">
Household tasks
<div class="options">
<label><input type="radio" name="tasks"> Yes</label>
<label><input type="radio" name="tasks"> No</label>
</div>
</div>

</div>



<!-- EVENING -->

<div id="evening" class="section">

<div class="task">
Dinner & hydration
<div class="options">
<label><input type="radio" name="dinner"> Yes</label>
<label><input type="radio" name="dinner"> No</label>
</div>
</div>

<div class="task">
Medication given
<div class="options">
<label><input type="radio" name="med3"> Yes</label>
<label><input type="radio" name="med3"> No</label>
</div>
</div>

<div class="task">
Prepare bedroom
<div class="options">
<label><input type="radio" name="bed"> Yes</label>
<label><input type="radio" name="bed"> No</label>
</div>
</div>

</div>


<label>Notes</label>

<textarea id="notes" rows="4"></textarea>


<button onclick="shareWhatsApp()">
Share Report to WhatsApp
</button>


</body>
</html>
