<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Caregiver Checklist</title>

<style>
body{
font-family: Arial;
padding:20px;
background:#f4f6f8;
}

h2{
text-align:center;
}

.section{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:8px;
margin-top:5px;
}

button{
width:100%;
padding:15px;
background:#25D366;
color:white;
border:none;
border-radius:6px;
font-size:18px;
}

</style>
</head>

<body>

<h2>Patient Care Checklist</h2>

<div class="section">

<label>Patient Name</label>
<input id="patient">

<label>Date</label>
<input type="date" id="date">

<label>Day</label>
<select id="day">
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>
</select>

</div>

<div class="section">

<h3>Morning</h3>

<label>Medication Given</label>
<select id="m_med">
<option>Yes</option>
<option>No</option>
</select>

<label>Medication Stock OK</label>
<select id="m_stock">
<option>Yes</option>
<option>No</option>
</select>

<label>Meals Eaten</label>
<select id="m_meal">
<option>All</option>
<option>Half</option>
<option>Little</option>
<option>None</option>
</select>

<label>Side Effects</label>
<input id="m_side">

</div>


<div class="section">

<h3>Afternoon</h3>

<label>Medication Given</label>
<select id="a_med">
<option>Yes</option>
<option>No</option>
</select>

<label>Meals Eaten</label>
<select id="a_meal">
<option>All</option>
<option>Half</option>
<option>Little</option>
<option>None</option>
</select>

<label>Side Effects</label>
<input id="a_side">

</div>


<div class="section">

<label>Notes / Actions Taken</label>
<textarea id="notes"></textarea>

</div>


<button onclick="sendWhatsApp()">Send Report via WhatsApp</button>


<script>

function sendWhatsApp(){

let message =
`PATIENT CARE REPORT

Patient: ${patient.value}
Date: ${date.value}
Day: ${day.value}

--- MORNING ---
Medication Given: ${m_med.value}
Stock OK: ${m_stock.value}
Meals: ${m_meal.value}
Side Effects: ${m_side.value}

--- AFTERNOON ---
Medication Given: ${a_med.value}
Meals: ${a_meal.value}
Side Effects: ${a_side.value}

Notes:
${notes.value}
`;

let url = "https://wa.me/?text=" + encodeURIComponent(message);

window.open(url);

}

</script>

</body>
</html>
