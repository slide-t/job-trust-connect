<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Care Checklist</title>

<style>

body{
font-family:Arial;
background:#0f1a20;
color:white;
padding:20px;
max-width:500px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:25px;
}

.section{
margin-bottom:25px;
}

.option{
margin:8px 0;
}

.bar{
height:10px;
background:#2a2a2a;
border-radius:10px;
margin-top:5px;
}

.fill{
height:10px;
background:#ff4d6d;
border-radius:10px;
width:0%;
}

label{
font-size:16px;
}

</style>
</head>

<body>

<h2>Daily Care Checklist</h2>

<div class="section">
<b>Morning Care</b>

<div class="option">
<label><input type="radio" name="bath" onclick="fill('bathbar')"> Bathing Done</label>
<div class="bar"><div id="bathbar" class="fill"></div></div>
</div>

<div class="option">
<label><input type="radio" name="oral" onclick="fill('oralbar')"> Oral Hygiene Done</label>
<div class="bar"><div id="oralbar" class="fill"></div></div>
</div>

<div class="option">
<label><input type="radio" name="breakfast" onclick="fill('breakbar')"> Breakfast Given</label>
<div class="bar"><div id="breakbar" class="fill"></div></div>
</div>

<div class="option">
<label><input type="radio" name="med1" onclick="fill('medbar')"> Medication Given</label>
<div class="bar"><div id="medbar" class="fill"></div></div>
</div>

</div>


<div class="section">
<b>Afternoon Care</b>

<div class="option">
<label><input type="radio" name="lunch" onclick="fill('lunchbar')"> Lunch Given</label>
<div class="bar"><div id="lunchbar" class="fill"></div></div>
</div>

<div class="option">
<label><input type="radio" name="mobility" onclick="fill('mobbar')"> Mobility Assistance</label>
<div class="bar"><div id="mobbar" class="fill"></div></div>
</div>

<div class="option">
<label><input type="radio" name="tasks" onclick="fill('taskbar')"> Household Tasks Done</label>
<div class="bar"><div id="taskbar" class="fill"></div></div>
</div>

</div>


<div class="section">
<b>Evening Care</b>

<div class="option">
<label><input type="radio" name="dinner" onclick="fill('dinbar')"> Dinner Given</label>
<div class="bar"><div id="dinbar" class="fill"></div></div>
</div>

<div class="option">
<label><input type="radio" name="med2" onclick="fill('med2bar')"> Medication Given</label>
<div class="bar"><div id="med2bar" class="fill"></div></div>
</div>

<div class="option">
<label><input type="radio" name="bed" onclick="fill('bedbar')"> Bedroom Prepared</label>
<div class="bar"><div id="bedbar" class="fill"></div></div>
</div>

</div>


<script>

function fill(bar){
document.getElementById(bar).style.width="100%";
}

</script>

</body>
</html>
