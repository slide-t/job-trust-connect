<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daily Care Checklist</title>

<style>

body{
font-family:Arial;
background:#0f1a20;
color:white;
margin:0;
padding:15px;
}

h2{
text-align:center;
margin-bottom:10px;
}

.section{
display:none;
margin-top:15px;
}

.task{
background:#1b2b34;
padding:12px;
margin:10px 0;
border-radius:8px;
}

.task label{
display:block;
font-size:15px;
margin-bottom:6px;
}

.options{
display:flex;
gap:20px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
background:#ff4d6d;
color:white;
font-size:14px;
}

.topbuttons{
text-align:center;
}

</style>

<script>

function showSection(id){

document.getElementById("morning").style.display="none";
document.getElementById("afternoon").style.display="none";
document.getElementById("evening").style.display="none";

document.getElementById(id).style.display="block";

}

</script>

</head>

<body>

<h2>Daily Care Checklist</h2>

<div class="topbuttons">

<button onclick="showSection('morning')">Morning</button>
<button onclick="showSection('afternoon')">Afternoon</button>
<button onclick="showSection('evening')">Evening</button>

</div>


<!-- MORNING -->

<div id="morning" class="section">

<h3>Morning Care</h3>

<div class="task">
<label>Assist with washing / bathing</label>
<div class="options">
<label><input type="radio" name="bath"> Yes</label>
<label><input type="radio" name="bath"> No</label>
</div>
</div>

<div class="task">
<label>Oral hygiene (teeth / dentures)</label>
<div class="options">
<label><input type="radio" name="oral"> Yes</label>
<label><input type="radio" name="oral"> No</label>
</div>
</div>

<div class="task">
<label>Grooming (hair / shaving)</label>
<div class="options">
<label><input type="radio" name="groom"> Yes</label>
<label><input type="radio" name="groom"> No</label>
</div>
</div>

<div class="task">
<label>Dress in clean clothes</label>
<div class="options">
<label><input type="radio" name="dress"> Yes</label>
<label><input type="radio" name="dress"> No</label>
</div>
</div>

<div class="task">
<label>Breakfast & hydration</label>
<div class="options">
<label><input type="radio" name="breakfast"> Yes</label>
<label><input type="radio" name="breakfast"> No</label>
</div>
</div>

<div class="task">
<label>Medication given</label>
<div class="options">
<label><input type="radio" name="med1"> Yes</label>
<label><input type="radio" name="med1"> No</label>
</div>
</div>

<div class="task">
<label>Morning exercise / walk</label>
<div class="options">
<label><input type="radio" name="exercise"> Yes</label>
<label><input type="radio" name="exercise"> No</label>
</div>
</div>

<div class="task">
<label>Blood sugar check (if required)</label>
<div class="options">
<label><input type="radio" name="sugar"> Yes</label>
<label><input type="radio" name="sugar"> No</label>
</div>
</div>

</div>



<!-- AFTERNOON -->

<div id="afternoon" class="section">

<h3>Afternoon Care</h3>

<div class="task">
<label>Lunch & hydration</label>
<div class="options">
<label><input type="radio" name="lunch"> Yes</label>
<label><input type="radio" name="lunch"> No</label>
</div>
</div>

<div class="task">
<label>Mobility / transfer assistance</label>
<div class="options">
<label><input type="radio" name="mobility"> Yes</label>
<label><input type="radio" name="mobility"> No</label>
</div>
</div>

<div class="task">
<label>Light household tasks</label>
<div class="options">
<label><input type="radio" name="tasks"> Yes</label>
<label><input type="radio" name="tasks"> No</label>
</div>
</div>

<div class="task">
<label>Social interaction / conversation</label>
<div class="options">
<label><input type="radio" name="social"> Yes</label>
<label><input type="radio" name="social"> No</label>
</div>
</div>

<div class="task">
<label>Cognitive activity (music, puzzles)</label>
<div class="options">
<label><input type="radio" name="brain"> Yes</label>
<label><input type="radio" name="brain"> No</label>
</div>
</div>

<div class="task">
<label>Medication given</label>
<div class="options">
<label><input type="radio" name="med2"> Yes</label>
<label><input type="radio" name="med2"> No</label>
</div>
</div>

</div>



<!-- EVENING -->

<div id="evening" class="section">

<h3>Evening Care</h3>

<div class="task">
<label>Dinner & hydration</label>
<div class="options">
<label><input type="radio" name="dinner"> Yes</label>
<label><input type="radio" name="dinner"> No</label>
</div>
</div>

<div class="task">
<label>Medication given</label>
<div class="options">
<label><input type="radio" name="med3"> Yes</label>
<label><input type="radio" name="med3"> No</label>
</div>
</div>

<div class="task">
<label>Evening wash / change into nightwear</label>
<div class="options">
<label><input type="radio" name="wash"> Yes</label>
<label><input type="radio" name="wash"> No</label>
</div>
</div>

<div class="task">
<label>Tidy kitchen / clean up</label>
<div class="options">
<label><input type="radio" name="kitchen"> Yes</label>
<label><input type="radio" name="kitchen"> No</label>
</div>
</div>

<div class="task">
<label>Prepare bedroom for comfort</label>
<div class="options">
<label><input type="radio" name="bedroom"> Yes</label>
<label><input type="radio" name="bedroom"> No</label>
</div>
</div>

<div class="task">
<label>Blood sugar check</label>
<div class="options">
<label><input type="radio" name="sugar2"> Yes</label>
<label><input type="radio" name="sugar2"> No</label>
</div>
</div>

</div>

</body>
</html>
